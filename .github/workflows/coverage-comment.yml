name: Laravel Coverage Comment

on:
  workflow_call:
    inputs:
      php-version:
        description: "PHP version to set up"
        required: false
        default: "8.3"
        type: string
      test-command:
        description: "The command to execute tests and generate coverage output"
        required: false
        default: "./vendor/bin/pest --ci --coverage"
        type: string
      coverage-driver:
        description: "PHP extension to use for coverage (e.g. pcov, xdebug)"
        required: false
        default: "pcov"
        type: string

jobs:
  ci:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php-version }}
          tools: composer:v2
          coverage: ${{ inputs.coverage-driver }}

      - name: Get Composer Cache Directory
        id: composer-cache
        run: |
          echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer Dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Run Tests
        shell: bash
        run: |
          ${{ inputs.test-command }} | tee coverage.txt
          exit ${PIPESTATUS[0]}

      - name: Upload Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: laravel-logs
          path: storage/logs

      - name: Process Coverage Summary
        if: github.event_name == 'pull_request' && hashFiles('coverage.txt') != ''
        id: coverage
        run: |
          # Extract total percentage
          TOTAL=$(grep "Total:" coverage.txt | awk '{print $2}')
          
          # If TOTAL is empty, default to N/A
          if [ -z "$TOTAL" ]; then
            TOTAL="N/A"
          fi

          # Prepare the comment body
          echo "REPORT<<EOF" >> $GITHUB_OUTPUT
          echo "### 📊 Test Coverage: $TOTAL%" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "<details><summary>Click to view detailed report</summary>" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "\`\`\`" >> $GITHUB_OUTPUT
          
          # Extract the table part (starting from the first file path line)
          if grep -q "\.\.\." coverage.txt; then
            sed -n '/\.\.\./,$p' coverage.txt | sed 's/\x1b\[[0-9;]*m//g' >> $GITHUB_OUTPUT
          else
            cat coverage.txt | sed 's/\x1b\[[0-9;]*m//g' >> $GITHUB_OUTPUT
          fi
          
          echo "\`\`\`" >> $GITHUB_OUTPUT
          echo "</details>" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post Coverage Comment
        if: github.event_name == 'pull_request' && steps.coverage.outputs.REPORT != ''
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: test-coverage
          message: ${{ steps.coverage.outputs.REPORT }}
