name: Laravel Coverage Comment

on:
  workflow_call:

jobs:
  ci:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          tools: composer:v2
          coverage: xdebug

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Run Tests
        shell: bash
        run: |
          ./vendor/bin/pest --ci --coverage | tee coverage.txt
          exit ${PIPESTATUS[0]}

      - name: Upload Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: laravel-logs
          path: storage/logs

      - name: Process Coverage Summary
        if: github.event_name == 'pull_request'
        id: coverage
        run: |
          # Extract total percentage
          TOTAL=$(grep "Total:" coverage.txt | awk '{print $2}')

          # Prepare the comment body
          echo "REPORT<<EOF" >> $GITHUB_OUTPUT
          echo "### 📊 Test Coverage: $TOTAL%" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "<details><summary>Click to view detailed report</summary>" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "\`\`\`" >> $GITHUB_OUTPUT
          # Extract the table part (starting from the first file path line)
          sed -n '/\.\.\./,$p' coverage.txt | sed 's/\x1b\[[0-9;]*m//g' >> $GITHUB_OUTPUT
          echo "\`\`\`" >> $GITHUB_OUTPUT
          echo "</details>" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post Coverage Comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: test-coverage
          message: ${{ steps.coverage.outputs.REPORT }}
